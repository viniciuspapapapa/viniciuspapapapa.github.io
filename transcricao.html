<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transcrição de Áudio/Vídeo — Vinicius</title>
<style>
:root {
  --bg:       #0f1117;
  --surface:  #1a1d27;
  --surface2: #22263a;
  --border:   #2e3248;
  --accent:   #7c6af7;
  --accent2:  #5b50c8;
  --green:    #34d399;
  --red:      #f87171;
  --yellow:   #fbbf24;
  --purple:   #a78bfa;
  --text:     #e2e8f0;
  --muted:    #94a3b8;
  --radius:   12px;
  --radius-sm:8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

/* NAV */
nav { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
.nav-inner { max-width: 860px; margin: 0 auto; display: flex; align-items: center; gap: 4px; padding: 0 20px; }
.nav-title { font-weight: 700; font-size: 15px; color: var(--accent); white-space: nowrap; padding: 15px 0; }
.nav-sub { font-size: 12px; color: var(--muted); margin-left: 10px; }

/* LAYOUT */
main { max-width: 860px; margin: 0 auto; padding: 28px 20px 60px; display: flex; flex-direction: column; gap: 18px; }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 22px; }
.card-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 14px; }

/* MODEL SELECTOR */
.model-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.model-opt { position: relative; cursor: pointer; }
.model-opt input { position: absolute; opacity: 0; width: 0; height: 0; }
.model-box {
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  transition: border-color .15s, background .15s;
  cursor: pointer;
}
.model-opt input:checked + .model-box {
  border-color: var(--accent);
  background: rgba(124,106,247,.08);
}
.model-box:hover { border-color: var(--accent2); }
.model-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.model-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
.model-badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .05em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 4px;
  margin-bottom: 6px;
}
.badge-fast { background: rgba(52,211,153,.15); color: var(--green); }
.badge-best { background: rgba(124,106,247,.2); color: var(--accent); }
.badge-balanced { background: rgba(251,191,36,.15); color: var(--yellow); }

/* DROP ZONE */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 40px 24px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  position: relative;
}
.drop-zone.drag-over { border-color: var(--accent); background: rgba(124,106,247,.06); }
.drop-zone.has-file { border-color: var(--green); border-style: solid; }
.drop-icon { font-size: 36px; margin-bottom: 10px; line-height: 1; }
.drop-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.drop-hint { font-size: 12px; color: var(--muted); }
.drop-formats { font-size: 11px; color: var(--border); margin-top: 10px; letter-spacing: .03em; }
.file-info { display: none; align-items: center; gap: 12px; text-align: left; }
.file-info.visible { display: flex; }
.file-icon { font-size: 28px; flex-shrink: 0; }
.file-name { font-size: 14px; font-weight: 600; color: var(--text); word-break: break-all; }
.file-size { font-size: 12px; color: var(--muted); margin-top: 2px; }
.file-change { font-size: 11px; color: var(--accent); margin-top: 4px; cursor: pointer; text-decoration: underline; }
#fileInput { display: none; }

/* ACTIONS */
.action-bar { display: flex; gap: 10px; align-items: center; }
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 10px 20px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 600; cursor: pointer;
  border: none; transition: opacity .15s, transform .1s;
}
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--accent2); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
.btn-sm { padding: 7px 14px; font-size: 12px; }

/* PROGRESS */
.progress-card { display: none; }
.progress-card.visible { display: block; }
.status-line { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.spinner {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  animation: spin .7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.status-text { font-size: 14px; font-weight: 500; }
.seg-count { font-size: 12px; color: var(--muted); margin-top: 2px; }

.stream-preview {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  max-height: 220px;
  overflow-y: auto;
  font-size: 13px;
  line-height: 1.65;
  color: var(--muted);
}
.stream-preview p { margin: 0; padding: 2px 0; }
.stream-preview p.last { color: var(--text); }

/* RESULTS */
.results-card { display: none; }
.results-card.visible { display: block; }
.results-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.results-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); flex: 1; min-width: 80px; }
.tab-row { display: flex; gap: 4px; }
.tab-btn {
  padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 500;
  background: none; border: 1px solid var(--border); color: var(--muted);
  cursor: pointer; transition: all .15s;
}
.tab-btn.active { background: var(--surface2); border-color: var(--accent); color: var(--accent); }
.tab-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }

.meta-row { display: flex; gap: 20px; margin-bottom: 14px; flex-wrap: wrap; }
.meta-item { font-size: 12px; color: var(--muted); }
.meta-item strong { color: var(--text); }

.text-output {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  font-size: 14px;
  line-height: 1.75;
  color: var(--text);
  min-height: 120px;
  max-height: 400px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-word;
  display: none;
}
.text-output.visible { display: block; }

.timestamps-output { display: none; max-height: 400px; overflow-y: auto; }
.timestamps-output.visible { display: block; }
.ts-segment {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 8px 0; border-bottom: 1px solid var(--border);
}
.ts-segment:last-child { border-bottom: none; }
.ts-time {
  font-size: 11px; color: var(--accent); font-family: monospace;
  background: rgba(124,106,247,.1); padding: 2px 7px; border-radius: 4px;
  white-space: nowrap; flex-shrink: 0; margin-top: 1px;
}
.ts-text { font-size: 13px; line-height: 1.6; color: var(--text); }

.export-bar { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

/* ERROR */
.error-banner {
  display: none;
  background: rgba(248,113,113,.1);
  border: 1px solid rgba(248,113,113,.3);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 13px;
  color: var(--red);
  gap: 8px;
  align-items: flex-start;
}
.error-banner.visible { display: flex; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 600px) {
  .model-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <span class="nav-title">Transcrição de Áudio/Vídeo</span>
    <span class="nav-sub">Powered by Whisper · Português (Brasil)</span>
  </div>
</nav>

<main>

  <!-- Model selector -->
  <div class="card">
    <div class="card-title">Modelo de Transcrição</div>
    <div class="model-grid">

      <label class="model-opt">
        <input type="radio" name="model" value="tiny">
        <div class="model-box">
          <div class="model-badge badge-fast">Rápido</div>
          <div class="model-name">Tiny</div>
          <div class="model-desc">Muito rápido, precisão básica. ~40 MB</div>
        </div>
      </label>

      <label class="model-opt">
        <input type="radio" name="model" value="small">
        <div class="model-box">
          <div class="model-badge badge-fast">Rápido</div>
          <div class="model-name">Small</div>
          <div class="model-desc">Bom equilíbrio entre velocidade e precisão. ~240 MB</div>
        </div>
      </label>

      <label class="model-opt">
        <input type="radio" name="model" value="medium">
        <div class="model-box">
          <div class="model-badge badge-balanced">Equilibrado</div>
          <div class="model-name">Medium</div>
          <div class="model-desc">Alta precisão, velocidade razoável. ~760 MB</div>
        </div>
      </label>

      <label class="model-opt">
        <input type="radio" name="model" value="large-v3" checked>
        <div class="model-box">
          <div class="model-badge badge-best">Melhor</div>
          <div class="model-name">Large-v3</div>
          <div class="model-desc">Máxima precisão para português. ~1.5 GB</div>
        </div>
      </label>

    </div>
  </div>

  <!-- Upload -->
  <div class="card">
    <div class="card-title">Arquivo de Áudio ou Vídeo</div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".mp3,.mp4,.wav,.m4a,.mkv,.avi,.mov,.webm,.flac,.ogg,.wma,.wmv,.mpeg,.mpga">

      <div id="dropPlaceholder">
        <div class="drop-icon">🎵</div>
        <div class="drop-title">Arraste o arquivo aqui</div>
        <div class="drop-hint">ou clique para selecionar</div>
        <div class="drop-formats">MP3 · MP4 · WAV · M4A · MKV · AVI · MOV · WEBM · FLAC · OGG · WMV</div>
      </div>

      <div class="file-info" id="fileInfo">
        <div class="file-icon" id="fileTypeIcon">🎬</div>
        <div>
          <div class="file-name" id="fileName"></div>
          <div class="file-size" id="fileSize"></div>
          <div class="file-change" id="fileChange">Trocar arquivo</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Error -->
  <div class="error-banner" id="errorBanner">
    <span>⚠</span>
    <span id="errorMsg"></span>
  </div>

  <!-- Action -->
  <div class="action-bar">
    <button class="btn btn-primary" id="btnTranscrever" disabled>
      <span>▶</span> Transcrever
    </button>
    <button class="btn btn-secondary" id="btnCancelar" style="display:none">
      Cancelar
    </button>
  </div>

  <!-- Progress -->
  <div class="card progress-card" id="progressCard">
    <div class="status-line">
      <div class="spinner"></div>
      <div>
        <div class="status-text" id="statusText">Iniciando...</div>
        <div class="seg-count" id="segCount"></div>
      </div>
    </div>
    <div class="stream-preview" id="streamPreview"></div>
  </div>

  <!-- Results -->
  <div class="card results-card" id="resultsCard">
    <div class="results-header">
      <div class="results-title">Transcrição</div>
      <div class="tab-row">
        <button class="tab-btn active" id="tabTexto" onclick="showTab('texto')">Texto</button>
        <button class="tab-btn" id="tabTimestamps" onclick="showTab('timestamps')">Com timestamps</button>
      </div>
    </div>

    <div class="meta-row" id="metaRow"></div>

    <div class="text-output visible" id="textOutput"></div>
    <div class="timestamps-output" id="timestampsOutput"></div>

    <div class="export-bar">
      <button class="btn btn-secondary btn-sm" onclick="copyText()">📋 Copiar texto</button>
      <button class="btn btn-secondary btn-sm" onclick="exportTxt()">⬇ Exportar TXT</button>
      <button class="btn btn-secondary btn-sm" onclick="exportSrt()">⬇ Exportar SRT</button>
    </div>
  </div>

</main>

<script>
const dropZone    = document.getElementById('dropZone');
const fileInput   = document.getElementById('fileInput');
const dropPlaceholder = document.getElementById('dropPlaceholder');
const fileInfo    = document.getElementById('fileInfo');
const fileName    = document.getElementById('fileName');
const fileSize    = document.getElementById('fileSize');
const fileTypeIcon= document.getElementById('fileTypeIcon');
const fileChange  = document.getElementById('fileChange');
const btnTrans    = document.getElementById('btnTranscrever');
const btnCancel   = document.getElementById('btnCancelar');
const progressCard= document.getElementById('progressCard');
const statusText  = document.getElementById('statusText');
const segCount    = document.getElementById('segCount');
const streamPreview=document.getElementById('streamPreview');
const resultsCard = document.getElementById('resultsCard');
const textOutput  = document.getElementById('textOutput');
const timestampsOutput = document.getElementById('timestampsOutput');
const errorBanner = document.getElementById('errorBanner');
const errorMsg    = document.getElementById('errorMsg');
const metaRow     = document.getElementById('metaRow');

let selectedFile = null;
let allSegments  = [];
let fullText     = '';
let abortCtrl    = null;
let isProcessing = false;

const AUDIO_EXTS = new Set(['.mp3', '.wav', '.m4a', '.flac', '.ogg', '.wma', '.mpga']);
const VIDEO_EXTS = new Set(['.mp4', '.mkv', '.avi', '.mov', '.webm', '.wmv', '.mpeg']);

function formatSize(bytes) {
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1024 / 1024).toFixed(1) + ' MB';
}

function formatTime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function srtTime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  const ms= Math.round((secs % 1) * 1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(ms).padStart(3,'0')}`;
}

function setFile(file) {
  selectedFile = file;
  const ext = '.' + file.name.split('.').pop().toLowerCase();
  const isVideo = VIDEO_EXTS.has(ext);
  fileTypeIcon.textContent = isVideo ? '🎬' : '🎵';
  fileName.textContent = file.name;
  fileSize.textContent = formatSize(file.size);
  dropPlaceholder.style.display = 'none';
  fileInfo.classList.add('visible');
  dropZone.classList.add('has-file');
  dropZone.classList.remove('drag-over');
  btnTrans.disabled = false;
  hideError();
}

fileChange.addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });

dropZone.addEventListener('click', () => { if (!isProcessing) fileInput.click(); });
fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});

function showError(msg) {
  errorMsg.textContent = msg;
  errorBanner.classList.add('visible');
}
function hideError() {
  errorBanner.classList.remove('visible');
}

function setProcessing(val) {
  isProcessing = val;
  btnTrans.style.display = val ? 'none' : 'inline-flex';
  btnCancel.style.display = val ? 'inline-flex' : 'none';
}

function showTab(tab) {
  const isText = tab === 'texto';
  document.getElementById('tabTexto').classList.toggle('active', isText);
  document.getElementById('tabTimestamps').classList.toggle('active', !isText);
  textOutput.classList.toggle('visible', isText);
  timestampsOutput.classList.toggle('visible', !isText);
}

btnCancel.addEventListener('click', () => {
  if (abortCtrl) abortCtrl.abort();
});

btnTrans.addEventListener('click', async () => {
  if (!selectedFile) return;
  hideError();

  const modelSize = document.querySelector('input[name="model"]:checked').value;

  const formData = new FormData();
  formData.append('file', selectedFile);
  formData.append('model', modelSize);

  allSegments = [];
  fullText = '';
  streamPreview.innerHTML = '';
  segCount.textContent = '';
  textOutput.textContent = '';
  timestampsOutput.innerHTML = '';
  metaRow.innerHTML = '';

  progressCard.classList.add('visible');
  resultsCard.classList.remove('visible');
  setProcessing(true);

  abortCtrl = new AbortController();

  try {
    const resp = await fetch('/transcribe', {
      method: 'POST',
      body: formData,
      signal: abortCtrl.signal,
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ error: 'Erro desconhecido' }));
      throw new Error(err.error || 'Erro no servidor');
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            handleEvent(JSON.parse(line.slice(6)));
          } catch (_) {}
        }
      }
    }
  } catch (err) {
    if (err.name === 'AbortError') {
      progressCard.classList.remove('visible');
    } else {
      progressCard.classList.remove('visible');
      showError(err.message || String(err));
    }
  } finally {
    setProcessing(false);
    abortCtrl = null;
  }
});

function handleEvent(data) {
  if (data.error) {
    progressCard.classList.remove('visible');
    showError(data.error);
    return;
  }
  if (data.status === 'carregando_modelo') {
    statusText.textContent = `Carregando modelo "${data.model}"…`;
    statusText.style.color = 'var(--yellow)';
    return;
  }
  if (data.status === 'transcrevendo') {
    statusText.textContent = 'Transcrevendo…';
    statusText.style.color = 'var(--accent)';
    return;
  }
  if (data.segment) {
    allSegments.push(data.segment);
    const count = allSegments.length;
    segCount.textContent = `${count} segmento${count > 1 ? 's' : ''} encontrado${count > 1 ? 's' : ''}`;

    const p = document.createElement('p');
    p.textContent = data.segment.text;
    // dim previous last
    const prev = streamPreview.querySelector('.last');
    if (prev) prev.classList.remove('last');
    p.classList.add('last');
    streamPreview.appendChild(p);
    streamPreview.scrollTop = streamPreview.scrollHeight;
    return;
  }
  if (data.done) {
    fullText = data.text;
    allSegments = data.segments;
    progressCard.classList.remove('visible');
    showResults(data);
    return;
  }
}

function showResults(data) {
  // meta
  const dur = data.duration;
  metaRow.innerHTML = `
    <span class="meta-item"><strong>${allSegments.length}</strong> segmentos</span>
    <span class="meta-item">Duração: <strong>${formatTime(dur)}</strong></span>
    <span class="meta-item">Palavras: <strong>${fullText.split(/\s+/).filter(Boolean).length}</strong></span>
  `;

  // plain text
  textOutput.textContent = fullText;

  // timestamps
  timestampsOutput.innerHTML = '';
  for (const seg of allSegments) {
    const row = document.createElement('div');
    row.className = 'ts-segment';
    row.innerHTML = `
      <span class="ts-time">${formatTime(seg.start)} → ${formatTime(seg.end)}</span>
      <span class="ts-text">${escHtml(seg.text)}</span>
    `;
    timestampsOutput.appendChild(row);
  }

  showTab('texto');
  resultsCard.classList.add('visible');
  resultsCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyText() {
  navigator.clipboard.writeText(fullText).then(() => {
    const btn = event.target.closest('button');
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ Copiado!';
    setTimeout(() => { btn.innerHTML = orig; }, 1800);
  });
}

function exportTxt() {
  download(fullText, 'transcricao.txt', 'text/plain');
}

function exportSrt() {
  let srt = '';
  allSegments.forEach((seg, i) => {
    srt += `${i + 1}\n${srtTime(seg.start)} --> ${srtTime(seg.end)}\n${seg.text}\n\n`;
  });
  download(srt.trimEnd() + '\n', 'transcricao.srt', 'text/plain');
}

function download(content, name, type) {
  const blob = new Blob([content], { type });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
